name: portfolio
description: Discount Queen — Flutter e-commerce app (GetX).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & DI
  get: ^4.7.3

  # Networking
  dio: ^5.9.1
  connectivity_plus: ^7.0.0

  # Local Storage
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Images & Cache
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  shimmer: ^3.0.0

  # Device & Platform
  device_info_plus: ^13.2.0
  package_info_plus: ^10.2.0
  permission_handler: ^12.0.1

  # Utilities
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  logger: ^2.6.2
  web: ^1.1.1
  flutter_dotenv: ^6.0.0
  supabase_flutter: ^2.9.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  firebase_remote_config: ^6.5.3
  firebase_messaging: ^16.4.1
  firebase_performance: ^0.11.4+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
    - family: Lobster
      fonts:
        - asset: assets/fonts/Lobster-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lobster-Bold.ttf
          weight: 700
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pacifico-Bold.ttf
          weight: 700

