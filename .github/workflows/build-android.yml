name: Build — Android

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - appbundle
          - both
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - profile
          - release
  push:
    tags:
      - 'v*'

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests First
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosushi/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  build-android:
    name: Build Android
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - uses: subosushi/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Setup .env
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env
      - name: Decode keystore
        if: ${{ github.event.inputs.build_mode == 'release' || github.event_name == 'push' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
      - name: Build APK
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' || github.event_name == 'push' }}
        run: flutter build apk --${{ github.event.inputs.build_mode || 'release' }} --dart-define=ENV=production
      - name: Build App Bundle
        if: ${{ github.event.inputs.build_type == 'appbundle' || github.event.inputs.build_type == 'both' || github.event_name == 'push' }}
        run: flutter build appbundle --${{ github.event.inputs.build_mode || 'release' }} --dart-define=ENV=production
      - name: Upload APK
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
      - name: Upload App Bundle
        if: ${{ github.event.inputs.build_type == 'appbundle' || github.event.inputs.build_type == 'both' || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 14
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          generate_release_notes: true
